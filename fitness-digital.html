<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Digital | Em Construção</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4500; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .content { text-align: center; z-index: 2; padding: 20px; }
        .icon-box { font-size: 5rem; color: var(--primary); animation: pulse 2s infinite; }
        h1 { font-size: 3rem; margin: 10px 0; background: linear-gradient(to right, #ff4500, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #8b949e; font-size: 1.2rem; }
        .progress-bar { width: 300px; height: 10px; background: #30363d; border-radius: 5px; margin: 20px auto; overflow: hidden; }
        .progress-fill { width: 75%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .back-btn { margin-top: 30px; display: inline-block; color: white; text-decoration: none; border: 1px solid var(--primary); padding: 10px 25px; border-radius: 5px; transition: 0.3s; }
        .back-btn:hover { background: var(--primary); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="content">
        <div class="icon-box"><i class="fas fa-dumbbell"></i></div>
        <h1>Fitness Digital</h1>
        <p>Estamos esculpindo o melhor portal de hipertrofia em casa.</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>75% Concluído</span><br>
        <a href="portfolio.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar ao Portfólio</a>
    </div>
</body>
</html>
