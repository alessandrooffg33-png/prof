<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Fitness Digital</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --primary: #ff4500;
            --primary-hover: #e63e00; --text: #f0f6fc; --border: #30363d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: var(--card); padding: 2.5rem; border-radius: 12px; width: 380px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo i { font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem; }
        .input-f { display: flex; align-items: center; background: #090b10; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; padding: 0 15px; }
        .input-f input { width: 100%; background: transparent; border: none; padding: 12px; color: white; outline: none; }
        .input-f i { color: #8b949e; width: 20px; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .hidden { display: none !important; }
        .celebration-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s; }
        .boneco { font-size: 5rem; color: var(--primary); animation: jump 0.5s infinite alternate; }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: rotate 1s linear infinite; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="box" id="v-login">
        <div class="logo"><i class="fas fa-user-circle"></i></div>
        <h2>Entrar</h2>
        <div class="input-f"><i class="fas fa-envelope"></i><input type="email" id="l-email" placeholder="E-mail"></div>
        <div class="input-f"><i class="fas fa-lock"></i><input type="password" id="l-pass" placeholder="Senha"></div>
        <button class="btn" onclick="app.login()">ACESSAR</button>
        <p style="margin-top:15px; font-size:0.9rem; color:#8b949e">Novo aqui? <a href="#" onclick="app.show('v-register')" style="color:var(--primary); text-decoration:none">Criar conta</a></p>
    </div>

    <div class="box hidden" id="v-register">
        <h2>Criar Conta</h2>
        <div class="input-f"><input type="text" id="r-name" placeholder="Nome Completo"></div>
        <div class="input-f"><input type="email" id="r-email" placeholder="Seu e-mail"></div>
        <div class="input-f"><input type="password" id="r-pass" placeholder="Senha"></div>
        <button class="btn" id="btn-reg" onclick="app.register()">ENVIAR CÓDIGO</button>
    </div>

    <div class="box hidden" id="v-verify">
        <h2>Verificar E-mail</h2>
        <p style="margin-bottom:15px; color:#8b949e">Digite o código de 6 dígitos</p>
        <div class="input-f"><input type="text" id="v-code" placeholder="000000" style="text-align:center; font-size:1.5rem; letter-spacing:5px"></div>
        <button class="btn" onclick="app.verify()">VERIFICAR</button>
    </div>

    <script>
        // Dados confirmados pelas suas imagens:
        const P_KEY = "A94D8kxYoXGumoWzG";
        const S_ID = "service_02cnn9m";
        const T_ID = "template_xbvitz7";

        emailjs.init(P_KEY);

        const app = {
            code: "", temp: {},
            show: (id) => {
                document.querySelectorAll('.box').forEach(b => b.classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            },
            register: () => {
                const name = document.getElementById('r-name').value;
                const email = document.getElementById('r-email').value;
                const pass = document.getElementById('r-pass').value;
                if(!name || !email || !pass) return alert("Preencha tudo!");

                app.code = Math.floor(100000 + Math.random() * 900000).toString();
                app.temp = { name, email, pass };

                const btn = document.getElementById('btn-reg');
                btn.innerHTML = `<i class="fas fa-spinner spinner"></i> Enviando...`;
                btn.disabled = true;

                emailjs.send(S_ID, T_ID, {
                    user_name: name,
                    verification_code: app.code,
                    email: email 
                }).then(() => {
                    app.show('v-verify');
                }).catch(err => {
                    alert("Erro no envio!");
                    console.error(err);
                }).finally(() => {
                    btn.innerHTML = "ENVIAR CÓDIGO";
                    btn.disabled = false;
                });
            },
            verify: () => {
                if(document.getElementById('v-code').value.trim() === app.code) {
                    localStorage.setItem(app.temp.email, JSON.stringify(app.temp));
                    app.celebrate();
                } else { alert("Código errado!"); }
            },
            celebrate: () => {
                document.body.insertAdjacentHTML('beforeend', `<div id="overlay" class="celebration-overlay"><div class="boneco"><i class="fas fa-child"></i></div><div style="margin-top:20px; font-weight:bold">Bem-vindo, ${app.temp.name}!</div></div>`);
                setTimeout(() => {
                    document.getElementById('overlay').style.opacity = '0';
                    setTimeout(() => { document.getElementById('overlay').remove(); app.show('v-login'); }, 800);
                }, 3000);
            },
            login: () => {
                const email = document.getElementById('l-email').value;
                const pass = document.getElementById('l-pass').value;
                const user = JSON.parse(localStorage.getItem(email));
                if(user && user.pass === pass) alert(`Sucesso! Bem-vindo ${user.name}`);
                else alert("Dados inválidos!");
            }
        };
    </script>
</body>
</html>
